# helmfile.yaml
repositories:
  - name: longhorn
    url: https://charts.longhorn.io
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  - name: bedag
    url: https://bedag.github.io/helm-charts/ 
releases:
  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    values:
      - defaultArgs: # Correct key for the metrics-server chart
          - --cert-dir=/tmp
          - --kubelet-insecure-tls
          - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: "1.6.2"
    values:
      - ./longhorn-values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "./longhorn-rebuild.sh"
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "longhorn-jobs.yaml", "-n", "longhorn-system"]
  - name: kubernetes-dashboard
    namespace: kubernetes-dashboard
    chart: https://github.com/kubernetes/dashboard/releases/download/kubernetes-dashboard-7.10.1/kubernetes-dashboard-7.10.1.tgz
    createNamespace: true
    atomic: false  # SET TO FALSE SO YOU CAN SEE THE ERRORS IF IT FAILS
    timeout: 600
    values:
      - ./kubernetes-dashboard-values.yaml
  - name: dashboard-admin-rbac
    namespace: kubernetes-dashboard
    chart: bedag/raw 
    version: 2.0.0
    needs: # Don't try this until the dashboard exists
      - kubernetes-dashboard
    values:
      - ./dashboard-admin-rbac-values.yaml
hooks:
  - events: ["cleanup"]
    showlogs: true
    command: ./fwd.sh
