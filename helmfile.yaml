repositories:
  - name: longhorn
    url: https://charts.longhorn.io
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
releases:
  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    values:
      - args:
          - --cert-dir=/tmp
          - --kubelet-insecure-tls
          - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: "1.6.2"
    values:
      - ./longhorn-values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "./longhorn-rebuild.sh"
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "longhorn-jobs.yaml", "-n", "longhorn-system"]
  - name: kubernetes-dashboard
    namespace: kubernetes-dashboard
    chart: bitnami/kubernetes-dashboard
    createNamespace: true
    values:
      # Automatically creates the 'kubernetes-dashboard-admin' ServiceAccount and RBAC
      - admin:
          enabled: true
      # Ensures the login page appears
      - auth:
          enabled: true
    hooks:
      # This runs your updated fwd.sh which now handles:
      # 1. Killing old tunnels
      # 2. Starting new Dashboard tunnel
      # 3. Starting new Longhorn tunnel
      # 4. Generating and printing the access token
      - events: ["postsync"]
        showlogs: true
        command: "./fwd.sh"
# Global hooks (optional, cleanup runs on helmfile destruction)
hooks:
  - events: ["cleanup"]
    showlogs: true
    command: "sh"
    args: ["-c", "kill $(lsof -t -i:8443,8080) 2>/dev/null || true"]
