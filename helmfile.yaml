# helmfile.yaml
#
# Declarative owner of:
#   1. Longhorn install        (longhorn-values.yaml drives config)
#   2. Longhorn post-install   (longhorn-jobs.yaml via hook — CRDs need to exist first)
#   3. Kubernetes Dashboard    (depends on Longhorn being ready)
#
# longhorn-rebuild.sh is the companion script — it handles destruction/cleanup
# before this file runs. This file only knows how to build, never destroy.
repositories:
  - name: longhorn
    url: https://charts.longhorn.io
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  - name: bedag
    url: https://bedag.github.io/helm-charts/ 
releases:
  # ── Kubernetes Dashboard ───────────────────────────────────────────────────
  - name: kubernetes-dashboard
    namespace: kubernetes-dashboard
    chart: https://github.com/kubernetes/dashboard/releases/download/kubernetes-dashboard-7.10.1/kubernetes-dashboard-7.10.1.tgz
    createNamespace: true
    atomic: true
    timeout: 600
    values:
      - extraArgs:
          - --enable-skip-login
          - --token-ttl=288000
      - api:
          containers:
            resources:
              limits:
                cpu: 200m
      - kong:
          proxy:
            http:
              enabled: true
            tls:
              enabled: false
  - name: dashboard-admin-rbac
    namespace: kubernetes-dashboard
    chart: bedag/raw 
    version: 2.0.0
    values:
      - resources:
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: admin-user
              namespace: kubernetes-dashboard
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: admin-user
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: cluster-admin
            subjects:
              - kind: ServiceAccount
                name: admin-user
                namespace: kubernetes-dashboard
          - apiVersion: v1
            kind: Secret
            metadata:
              name: admin-user-token
              namespace: kubernetes-dashboard
              annotations:
                kubernetes.io/service-account.name: admin-user
            type: kubernetes.io/service-account-token
  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    values:
      - args:
          - --kubelet-insecure-tls
  # ── Longhorn ──────────────────────────────────────────────────────────────
  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: "1.6.2"
    values:
      - ./longhorn-values.yaml
    # Use a hook to apply your extra config after longhorn is ready
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "longhorn-jobs.yaml", "-n", "longhorn-system"]
hooks:
  - events: ["cleanup"]
    showlogs: true
    command: "/bin/bash"
    args:
      - "-c"
      - |
        echo "Stopping old port-forwards..."
        kill $(lsof -t -i:8443) 2>/dev/null || true
        kill -9 $(lsof -t -i :8080) 2> /dev/null || true
        echo "Starting new tunnel to Dashboard..."
        kubectl port-forward -n kubernetes-dashboard svc/kubernetes-dashboard-kong-proxy 8443:80 > /dev/null 2>&1 &
        echo "Getting the Dashboard token..."
        kubectl get secret admin-user-token -n kubernetes-dashboard -o jsonpath='{.data.token}' | base64 -d
        echo "Starting new tunnel to longhorn..."
        echo "✅ Dashboard is now live at http://localhost:8443"
        kubectl port-forward -n longhorn-system svc/longhorn-frontend 8080:80 > /dev/null 2>&1 & 
        echo "✅ Longhorn is now live at http://localhost:8080"
