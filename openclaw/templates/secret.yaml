apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.instanceName }}-secrets
  namespace: {{ .Values.instanceName }}
type: Opaque
stringData:
  slack-bot-token: {{ .Values.slack.botToken | quote }}
  slack-app-token: {{ .Values.slack.appToken | quote }}
  gateway-token: {{ .Values.gatewayToken | quote }}
