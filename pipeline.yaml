  - name: "wait_for_cluster"
    script: "bash ./scripts/wait-for-cluster.sh" # Point to the actual script file
    mode: "foreground"
  - name: "apps"
    mode: "foreground"
    script: "helmfile apply -f ./yaml/helmfile.yaml"
  - name: "demo_source"
    script: "./demo"
    mode: "source"
  - name: "cleanup"
    script: "cleanup" # Assumes 'cleanup' is an alias or in path
    mode: "foreground"
