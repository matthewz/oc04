settings:
  verbose: true
  shell_init: "source ./.alias" 
steps:
  - name: "clean_workspace"
    mode: "foreground"
    script: |
      mkdir -p ./terraform/out
      rm -rf ./terraform/out/*
      echo "🧹 Workspace cleaned."
  - name: "infrastructure"
    mode: "foreground"
    script: |
      set -x
      cd terraform
      terraform init
      terraform apply -auto-approve 
      if [ $? -ne 0 ]; then
        echo "❌ Critical Failure: Terraform failed the apply...exiting..."
        exit 1
      fi
      terraform output -raw master_name > ../.master_name
      terraform output -raw vault_ip   > ../.vault_ip
      terraform output -raw vault_addr > ../.vault_addr
    needs:
      - clean_workspace 
  - name: "wait_for_master"
    mode: "foreground"
    script: |
      if [ ! -f .master_name ]; then echo "❌ .master_name not found"; exit 1; fi
      MASTER=$(cat .master_name)
      echo "🎻 Waiting for Master API ($MASTER)..."
      MAX_RETRIES=20
      RETRY_COUNT=0
      until multipass exec $MASTER -- bash -c "sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl get nodes --request-timeout=5s" ; do
        echo "🎻 checking for Master API ($MASTER)..."
        RETRY_COUNT=$((RETRY_COUNT + 1))
        if [ $RETRY_COUNT -gt $MAX_RETRIES ]; then
          echo "❌ ERROR: Master failed to respond after $MAX_RETRIES retries: ... "
          set -x
          multipass exec $MASTER -- systemctl status kubelet | head -n 10
          set +x
          exit 1
        fi
        echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES..."
        sleep 5
      done
      echo "🚀 Master is online."
    needs: 
      - infrastructure 
  - name: "check_workers"
    script: |
      echo "🔍 Scanning workers..."
      MASTER=$(cat .master_name)
      > .nodes_to_join
      # DEFENSE: List all workers regardless of status (Deleted "Running" filter)
      WORKERS=$(multipass list --format csv | awk -F, 'NR>1 && $1 ~ /worker/ {print $1}' | xargs)
      echo "WORKERS=_${WORKERS}_"
      for NODE in $WORKERS; do
        echo "🧐 Checking $NODE..."
        # Ensure the node is actually powered on
        VM_STATUS=$(multipass info $NODE --format csv | awk -F, 'NR>1 {print $2}')
        echo "VM_STATUS=_${VM_STATUS}_"
        if [ "$VM_STATUS" != "Running" ]; then
          echo "⁉️ $NODE is $VM_STATUS. Attempting to start..."
          multipass start $NODE || true
        fi
        echo "🧐 Checking if $NODE is registered in K8s..."
        NODE_CHECK=$(multipass exec $MASTER -- kubectl get node "$NODE" 2>&1)
        echo "NODE_CHECK=_${NODE_CHECK}_"
        if [[ $NODE_CHECK == *"not found"* ]]; then
            echo "❌ $NODE is not yet registered in the cluster. (VM is up, but K8s isn't ready)."
            echo "$NODE" >> .nodes_to_join
        elif [[ $NODE_CHECK == *"$NODE"* ]]; then
            READY_STATUS=$(multipass exec $MASTER -- kubectl get node "$NODE" -o "jsonpath={.status.conditions[?(@.type=='Ready')].status}")
            echo "READY_STATUS=_${READY_STATUS}_"
            if [ "$READY_STATUS" == "True" ]; then
                echo "✅ $NODE is Ready!"
            else
                echo "⏳ $NODE exists but status is: $READY_STATUS"
                echo "$NODE" >> .nodes_to_join
            fi
        else
            echo "❓ Unknown state for $NODE: $NODE_CHECK"
            echo "$NODE" >> .nodes_to_join
        fi
      done
    needs:
      - wait_for_master
  - name: "join_workers"
    script: |
      if [ ! -s .nodes_to_join ]; then
        echo "🎉 All workers are healthy. No action needed."
        exit 0
      fi
      MASTER=$(cat .master_name)
      echo "Nodes found:" 
      cat .nodes_to_join
      for NODE in $(cat .nodes_to_join); do
        echo "🛠️  Starting join script for $NODE..."
        bash ./scripts/join-worker.sh "$NODE" "$MASTER"
      done
      echo "✅ All worker joins finished."
      rm .nodes_to_join
    needs:
      - check_workers
  - name: "wait_for_cluster"
    script: "bash ./scripts/wait-for-cluster.sh"
    mode: "foreground"
    needs:
      - join_workers
  - name: "wait_for_vault"
    mode: "foreground"
    script: |
      if [ ! -f .vault_addr ]; then
        echo "❌ .vault_addr not found — did terraform apply succeed?"
        exit 1
      fi
      VAULT_ADDR=$(cat .vault_addr)
      echo "🔐 Waiting for Vault to come online at $VAULT_ADDR..."
      MAX_RETRIES=30
      RETRY_COUNT=0
      # /v1/sys/health returns 200 (initialized) or 501 (not initialized)
      # Both mean Vault is UP and reachable — we just want a response
      until curl -sf --max-time 3 \
        -o /dev/null \
        -w "%{http_code}" \
        "${VAULT_ADDR}/v1/sys/health" | grep -qE "^(200|429|472|473|501|503)$"; do
        RETRY_COUNT=$((RETRY_COUNT + 1))
        if [ $RETRY_COUNT -gt $MAX_RETRIES ]; then
          echo "❌ Vault did not come online after $MAX_RETRIES retries"
          echo "   Check: multipass shell vault-server"
          echo "   Then:  sudo systemctl status vault"
          exit 1
        fi
        echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES — Vault not ready yet..."
        sleep 5
      done
      echo "🔐 Vault is online at $VAULT_ADDR"
    needs:
      - infrastructure   # ← same as wait_for_master, runs in parallel with k8s
  - name: "init_vault"
    mode: "foreground"
    script: |
      VAULT_ADDR=$(cat .vault_addr)
      VAULT_IP=$(cat .vault_ip)
      export VAULT_ADDR
      # Check if already initialized — makes this step idempotent
      INIT_STATUS=$(curl -sf "${VAULT_ADDR}/v1/sys/health" | python3 -c "
      import sys, json
      d = json.load(sys.stdin)
      print('true' if d.get('initialized') else 'false')
      " 2>/dev/null || echo "false")
      if [ "$INIT_STATUS" = "true" ]; then
        echo "✅ Vault already initialized — checking seal status..."
        # 👇 REPLACE your old early-exit block with this
        SEAL_STATUS=$(curl -sf "${VAULT_ADDR}/v1/sys/health" | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        print('true' if d.get('sealed') else 'false')
        " 2>/dev/null || echo "true")
        if [ "$SEAL_STATUS" = "true" ]; then
          echo "🔒 Vault is sealed (e.g. after a reboot) — unsealing..."
          bash ./scripts/unseal-vault.sh "$VAULT_ADDR" ".vault_keys.json"
        else
          echo "🔓 Vault is initialized and unsealed. Nothing to do."
        fi
        exit 0
      fi
      # First-time path — vault has never been initialized
      echo "🔑 Initializing Vault for the first time..."
      bash ./scripts/init-vault.sh "$VAULT_ADDR"
      echo "🔓 Unsealing Vault..."
      bash ./scripts/unseal-vault.sh "$VAULT_ADDR" ".vault_keys.json"
      echo "⚙️  Configuring Vault (auth, policies, engines)..."
      bash ./scripts/configure-vault.sh "$VAULT_ADDR" ".vault_keys.json"
      echo "🔐 Vault ready."
    needs:
      - wait_for_vault
  - name: "apps"
    mode: "foreground"
    needs:
      - wait_for_cluster
      - init_vault
    script: |
      export VAULT_ADDR=$(cat .vault_addr)
      export LOCAL_IP=$(cat .local_ip 2>/dev/null || echo "192.168.50.1") 
      helmfile apply
