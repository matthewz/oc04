###
# pipeline.yaml
settings:
  verbose: true
  sudo_keepalive: true
steps:
  - name: k8s_rebuild
    script: ./k8s-rebuild.sh
    mode: foreground           
    log: k8s-rebuild_out.txt
    wrap_with_dates: true
  - name: wait_for_cluster
    script: >
      TRIES=0
      MAX_TRIES=60
      until kubectl get nodes --request-timeout=5s 1> /dev/null 2>&1
      do
        TRIES=$((TRIES+1))
        if [ $TRIES -ge $MAX_TRIES ]
        then
          echo "❌ Cluster never became ready after $((MAX_TRIES*10))s — aborting"
          exit 1 
        fi 
        echo "   ...waiting for cluster API (attempt $TRIES/$MAX_TRIES)"
        sleep 10 
      done 
      echo "✅ Cluster API is responding"
    mode: foreground
  - name: apps                  
    script: helmfile apply      
    mode: foreground   
    log: apps_out.txt
  - name: demo_source
    script: ./demo
    mode: source
  - name: oclaw_source
    script: ./oclaw
    mode: source
