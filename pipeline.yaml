###
# pipeline.yaml
settings:
  verbose: true
  sudo_keepalive: true
steps:
  - name: mac_wrangle
    script: ./mac_wrangle.sh
    mode: foreground
  - name: k8s_rebuild
    script: ./k8s-rebuild.sh
    mode: background           
    log: k8s-rebuild_out.txt
    wrap_with_dates: true
  - name: wait_for_cluster
    script: >
      TRIES=0; MAX=60;
      until kubectl get nodes --request-timeout=5s >/dev/null 2>&1; do
        TRIES=$((TRIES+1));
        if [ $TRIES -ge $MAX ]; then
          echo "❌ Cluster never became ready after $((MAX*10))s — aborting";
          exit 1;
        fi;
        echo "   ...waiting for cluster API (attempt $TRIES/$MAX)";
        sleep 10;
      done;
      echo "✅ Cluster API is responding"
    mode: foreground
  - name: apps                  
    script: helmfile apply      
    mode: foreground   
    log: apps_out.txt
  - name: demo_source
    script: ./demo
    mode: source
  - name: oclaw_source
    script: ./oclaw
